<script>
/* CLOCK */
const DAY_HE=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const MON_HE=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
function tickClock(){
  const n=new Date(),p=x=>String(x).padStart(2,"0");
  const h=n.getHours(),h12=h%12||12,ap=h>=12?"PM":"AM";
  document.getElementById("clock").textContent=h12+":"+p(n.getMinutes())+":"+p(n.getSeconds())+" "+ap;
}
setInterval(tickClock,500);tickClock();

/* TICKER */
let TK={custom:"",hdate:"",weekday:"",parsha:"",candles:"",events:""};
function rebuildTicker(){
  const sep="   ✦   ";
  // Always include: custom text, weekday + hebrew date, parsha, holiday events, candles
  const parts = [];
  if(TK.custom) parts.push(TK.custom);
  parts.push(TK.weekday + (TK.hdate ? "  |  " + TK.hdate : ""));
  if(TK.parsha) parts.push("פרשת השבוע: " + cleanParshaName(TK.parsha));
  if(TK.events) parts.push(TK.events);
  if(TK.candles) parts.push(TK.candles);
  const txt = parts.filter(Boolean).join(sep);
  const el = document.getElementById("tick-a");
  if(el) el.textContent = txt;
  // Start marquee once; do not restart on every periodic update
  startTickerMarquee();
}

let TICKER_RAF = 0;
let TICKER_X = 0;
let TICKER_TW = 0;
let TICKER_CW = 0;
let TICKER_LAST_T = 0;
const TICKER_PX_PER_SEC = 22; // slower scroll; increase to speed up
let TICKER_STARTED = false;
let TICKER_LAST_TXT = "";
const TICKER_FADE_START_PCT = 0.90; // start fading when left edge hits 90% of track
const TICKER_FADE_SPAN_PCT = 0.08;  // fade over the next 8% of track width
let TICKER_MIN_X = 0;
let TICKER_MAX_X = 0;
let TICKER_DIR = 1;

function startTickerMarquee(){
  const track = document.querySelector("#ticker .t-track");
  const seg = document.getElementById("tick-a");
  if(!track || !seg) return;

  const measure = (resetIfNeeded=false)=>{
    TICKER_CW = Math.max(1, track.clientWidth);
    TICKER_TW = Math.max(1, seg.scrollWidth);

    // Constrain motion to remain *inside* the banner (no off-screen travel).
    // If text fits, move within [0 .. (CW-TW)] and start centered.
    // If text overflows, move within [(CW-TW) .. 0] so the overflow can be revealed.
    if(TICKER_TW <= TICKER_CW){
      TICKER_MIN_X = 0;
      TICKER_MAX_X = Math.max(0, TICKER_CW - TICKER_TW);
      TICKER_DIR = 1; // left -> right
      if(resetIfNeeded || !TICKER_STARTED){
        // Start from the original position (left), not centered.
        TICKER_X = TICKER_MIN_X;
        seg.style.left = `${TICKER_X}px`;
        seg.style.opacity = "1";
      }
    }else{
      // Overflowing text: slide right->left to reveal content (still stays inside banner)
      TICKER_MIN_X = Math.min(0, TICKER_CW - TICKER_TW); // negative
      TICKER_MAX_X = 0;
      TICKER_DIR = -1;
      if(resetIfNeeded || !TICKER_STARTED){
        TICKER_X = 0;
        seg.style.left = "0px";
        seg.style.opacity = "1";
      }
    }
  };

  // If text changed, re-measure width but don't restart the loop mid-way.
  const txtNow = seg.textContent || "";
  const textChanged = txtNow !== TICKER_LAST_TXT;
  TICKER_LAST_TXT = txtNow;

  // Measure after layout/fonts settle
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    measure(!TICKER_STARTED); // reset only on first start
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(()=>measure(false)).catch(()=>{});
    }

    if(TICKER_STARTED) return;
    TICKER_STARTED = true;
    TICKER_LAST_T = 0;

    const step = (t)=>{
      if(!TICKER_LAST_T) TICKER_LAST_T = t;
      const dt = Math.min(0.05, (t - TICKER_LAST_T) / 1000);
      TICKER_LAST_T = t;

      // Keep widths fresh (in case of responsive changes)
      const cwNow = Math.max(1, track.clientWidth);
      const twNow = Math.max(1, seg.scrollWidth);
      if(Math.abs(cwNow - TICKER_CW) > 2 || Math.abs(twNow - TICKER_TW) > 2){
        measure(false);
      }

      TICKER_X += (TICKER_PX_PER_SEC * dt) * TICKER_DIR;

      // Fade based on the moving edge reaching 90% of the banner.
      // For left->right, use the RIGHT edge (x + textWidth).
      // (For overflow/right->left case we keep opacity at 1 for now.)
      let opacity = 1;
      if(TICKER_DIR > 0){
        const rightEdge = TICKER_X + TICKER_TW;
        const fadeStartEdge = TICKER_CW * TICKER_FADE_START_PCT;
        const fadeSpan = Math.max(10, TICKER_CW * TICKER_FADE_SPAN_PCT);
        const t = (rightEdge - fadeStartEdge) / fadeSpan;
        opacity = Math.max(0, Math.min(1, 1 - Math.max(0, t)));
      }
      seg.style.opacity = String(opacity);

      // Clamp to bounds
      if(TICKER_X < TICKER_MIN_X) TICKER_X = TICKER_MIN_X;
      if(TICKER_X > TICKER_MAX_X) TICKER_X = TICKER_MAX_X;

      // When we reach the end and have faded, restart to the starting position.
      const dirEndX = TICKER_DIR > 0 ? TICKER_MAX_X : TICKER_MIN_X;
      const atEnd = Math.abs(TICKER_X - dirEndX) < 0.5;
      if(TICKER_DIR > 0 && atEnd && opacity <= 0.02){
        measure(true); // resets position based on fit/overflow
      }

      seg.style.left = `${Math.round(TICKER_X)}px`;
      TICKER_RAF = requestAnimationFrame(step);
    };

    TICKER_RAF = requestAnimationFrame(step);
  }));
}

  const n=new Date();
  TK.weekday="יום "+DAY_HE[n.getDay()]+"  ·  "+n.getDate()+" "+MON_HE[n.getMonth()]+" "+n.getFullYear();

}

let SI=[],SP=0,SIT=null;
function renderSimchas(items){
  clearInterval(SIT);SI=items||[];SP=0;
  if(!SI.length){document.getElementById("simcha-wrap").innerHTML='<div class="muted">אין שמחות</div>';return;}
  showSimcha(0);
  if(SI.length>1)SIT=setInterval(()=>{
    const c=document.querySelector(".simcha-card");if(c)c.classList.add("out");
    setTimeout(()=>showSimcha((SP+1)%SI.length),560);

}
function showSimcha(i){
  SP=i;const it=SI[i];const el=document.getElementById("simcha-wrap");
  const dots=SI.length>1?'<div class="s-dots">'+SI.map((_,j)=>'<div class="s-dot'+(j===i?' on':'')+'"></div>').join("")+"</div>":"";
  const occasion=it.value?'לרגל '+esc(it.value):'';

    +'<div class="s-mazel">❆ מזל טוב ❆</div>'

/* ANN */
function renderAnn(items){
  const el=document.getElementById("ann-wrap");
  if(!items||!items.length){el.innerHTML='<div class="muted">אין הודעות</div>';return;}
  el.innerHTML=items.map(i=>'<div class="ann-row"><span class="ann-lbl">'+esc(i.label)+'</span><span class="ann-val">'+esc(i.value)+'</span></div>').join("");
}

/* LEARNING */
const LEARN_ORDER=[
  "פרשת השבוע","דף יומי","ירושלמי","משניות","משנה יומית",
  "הלכה יומית","אהבת תורה","ספירת העומר"
];
const LEARN_SKIP=new Set(["תאריך עברי","יום בשבוע"]);

function normalizeLearningItems(items){
  const seen=new Map();
  for(const item of (items||[])){
    const label=(item.label||"").trim();
    const value=(item.value||"").trim();
    if(!label||!value||LEARN_SKIP.has(label)) continue;
    seen.set(label,{label,value});
  }
  const ordered=[];
  for(const label of LEARN_ORDER){
    if(seen.has(label)) ordered.push(seen.get(label));
  }
  for(const [label,item] of seen){
    if(!LEARN_ORDER.includes(label)) ordered.push(item);
  }
  return ordered;
}

function renderLearning(items){
  const wrap=document.getElementById("learn-wrap");
  const sc=document.getElementById("learn-scroll");
  const normalized=normalizeLearningItems(items);
  wrap.classList.remove("scrolling");
  sc.classList.remove("scrolling");
  sc.style.animation="none";
  sc.style.removeProperty("--learn-loop");
  if(!normalized.length){
    sc.innerHTML='<div class="muted">אין תוכן</div>';
    return;
  }
  const row=i=>'<div class="learn-row"><span class="l-cat">'+esc(i.label)+'</span><span class="l-val">'+esc(i.value)+'</span></div>';
  const html=normalized.map(row).join("");
  sc.innerHTML='<div class="learn-set">'+html+'</div>';

  requestAnimationFrame(()=>{
    const set=sc.querySelector(".learn-set");
    if(!set) return;
    const loopPx=set.offsetHeight;
    const needsScroll=loopPx>wrap.clientHeight+4;
    if(!needsScroll) return;

    wrap.classList.add("scrolling");
    sc.classList.add("scrolling");
    const track=document.createElement("div");
    track.className="learn-track";
    track.appendChild(set);
    track.appendChild(set.cloneNode(true));
    sc.innerHTML="";
    sc.appendChild(track);

    const dur=Math.max(30,normalized.length*6)+"s";
    track.style.setProperty("--learn-loop",loopPx+"px");
    void track.offsetHeight;
    track.style.animation="learnScroll "+dur+" linear infinite";
  });
}

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

function cleanParshaName(raw){
  return (raw||"")
    .replace(/^פרשת\s+/u,"")
    .replace(/^פרשה\s+/u,"")
    .replace(/^Parshat\s+/i,"")
    .replace(/^Parasha\s+/i,"")
    .replace(/^Parashat\s+/i,"")
    .trim();
}

function cleanSimchaLabel(raw){
  let s=(raw||"").trim();
  s=s.replace(/(\s*שליט[""״]א\s*){2,}$/u," שליט״א");
  return s.trim();
}

function fmt12(iso,tz){
  try{return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:tz});}
  catch{return "–";}
}

/* HEBCAL — ticker: yomtov, rosh chodesh, parsha, candles, havdalah, all events */
async function loadHebcal(){
  const lat=CFG.latitude||40.7128,lon=CFG.longitude||-74.006,tz=CFG.timezone||"America/New_York";
  const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,d=n.getDate(),ts=n.toDateString();

  // Hebrew date
  try{
    const cv=await fetch("https://www.hebcal.com/converter?cfg=json&gy="+y+"&gm="+m+"&gd="+d+"&g2h=1&strict=1").then(r=>r.json());
    if(cv&&cv.hebrew){TK.hdate=cv.hebrew;rebuildTicker();}
  }catch(e){}

  // Full calendar — all events including yomtov, rosh chodesh, fasts, omer, parsha, candles
  try{
    const url="https://www.hebcal.com/hebcal?v=1&cfg=json"
      +"&maj=on&min=on&mod=on&nx=on&mf=on&ss=on"
      +"&year="+y+"&month="+m
      +"&c=on&geo=pos&latitude="+lat+"&longitude="+lon
      +"&tzid="+encodeURIComponent(tz)+"&b=18&M=on&s=on&lg=h";
    const cal=await fetch(url).then(r=>r.json());
    if(!cal||!cal.items) throw new Error("no items");
    const today=cal.items.filter(x=>x.date&&new Date(x.date).toDateString()===ts);

    // Parsha: Hebcal usually lists it on Shabbat, not "today".
    // Pick the next upcoming parashat item in the current month feed.
    const nowMs = Date.now();
    const ppUpcoming = cal.items.find(x =>
      x && x.category === "parashat" && x.date && new Date(x.date).getTime() >= (nowMs - 86400000)
    );
    const ppToday = today.find(x=>x.category==="parashat");
    const pp = ppToday || ppUpcoming;
    TK.parsha = pp ? cleanParshaName(pp.hebrew || pp.title || "") : "";
     
    // Candle lighting
    const cc=today.find(x=>x.category==="candles");
    if(cc) TK.candles="🕯 הדלקת נרות: "+fmt12(cc.date,tz);

    // Havdalah (shown instead of candles in ticker)
    const hh=today.find(x=>x.category==="havdalah");
    if(hh) TK.candles="✨ הבדלה: "+fmt12(hh.date,tz);

    // All other events for the ticker
    const skip=new Set(["parashat","candles","havdalah","hebdate"]);
    const parts=[];
    for(const item of today){
      if(skip.has(item.category)) continue;
      const nm=item.hebrew||item.title||""; if(!nm.trim()) continue;
      let px="";
      if(item.category==="holiday"){
        // yomtov=true means major holiday (Rosh Hashana, Yom Kippur, Pesach etc.)
        if(item.yomtov)       px="🌟 ";
        else if(item.subcat==="fast") px="✊ ";
        else                  px="✨ ";
      } else if(item.category==="roshchodesh"){
        px="🌙 ";
      } else if(item.category==="mevarchim"){
        px="📅 ";
      } else if(item.category==="omer"){
        px="✨ ";
      }
      parts.push(px+nm);
    }
    TK.events=parts.join("   ★   ");
    rebuildTicker();
  }catch(e){console.log("loadHebcal:",e);}
}

/* LIMUDIM — KosherZmanim (local or CDN) with Hebcal fallback */
async function loadLimudim(){
  // Wait for KosherZmanim to be available (max 5 seconds)
  const kzReady = await new Promise(resolve => {
    if(typeof KosherZmanim !== "undefined"){ resolve(true); return; }
    let tries = 0;
    const check = setInterval(()=>{
      if(typeof KosherZmanim !== "undefined"){ clearInterval(check); resolve(true); }
      else if(++tries > 50){ clearInterval(check); resolve(false); }
    }, 100);
  });

  if(kzReady){
    try{
      const items = getKosherZmanimLimudim();
      const adminItems = CFG.learning_json || [];
      const dailyItems = await fetch("/api/limudim/today").then(r=>r.ok?r.json():[]).catch(()=>[]);
      renderLearning([...items, ...(dailyItems||[]), ...adminItems]);
      if(items.length > 0){
        console.log('KosherZmanim: got', items.length, 'limudim');
        return;
      }
    }catch(err){
      console.log('KosherZmanim error:', err.message);
    }
  }
  // Fallback to Hebcal
  await loadLimudimHebcal();
}

function getKosherZmanimLimudim(){
  const KZ = KosherZmanim;
  const items = [];
   
  const JewishCalendar = KZ.JewishCalendar;
  
  const YomiCalculator = KZ.YomiCalculator;
  
  const YerushalmiYomiCalculator = KZ.YerushalmiYomiCalculator;
  const HebrewDateFormatter = KZ.HebrewDateFormatter;
  

  if(!JewishCalendar) throw new Error('JewishCalendar not found');

  const jc = new JewishCalendar();
  jc.setInIsrael(false);
  
  const hdf = HebrewDateFormatter ? new HebrewDateFormatter() : null;
  if(hdf) hdf.setHebrewFormat(true);
  console.log(hdf);
  // ── Daf Yomi Bavli ──
  try{
    // Per docs: YomiCalculator.getDafYomiBavli(jc) is the static method
    const daf = YomiCalculator
      ? YomiCalculator.getDafYomiBavli(jc)
      : (typeof jc.getDafYomiBavli === 'function' ? jc.getDafYomiBavli() : null);
    if(daf){
      let text = '';
      if(hdf && typeof hdf.formatDafYomiBavli === 'function'){
        text = hdf.formatDafYomiBavli(daf);
      } else {
        const masechta = typeof daf.getMasechta === 'function' ? daf.getMasechta()
                       : typeof daf.getMasechtaTransliterated === 'function' ? daf.getMasechtaTransliterated()
                       : String(daf.masechtaNumber || '');
        const dafNum  = typeof daf.getDaf === 'function' ? daf.getDaf() : (daf.daf || '');
        text = masechta + ' ' + dafNum;
      }
      if(text.trim()) items.push({label:'\u05D3\u05E3 \u05D9\u05D5\u05DE\u05D9', value:text.trim()});
    }
  }catch(e){ console.log('daf bavli:', e.message); }

  // ── Daf Yomi Yerushalmi ──
  try{
    const ydaf = YerushalmiYomiCalculator
      ? YerushalmiYomiCalculator.getDafYomiYerushalmi(jc)
      : (typeof jc.getDafYomiYerushalmi === 'function' ? jc.getDafYomiYerushalmi() : null);
    if(ydaf){
      let text = '';
      if(hdf && typeof hdf.formatDafYomiYerushalmi === 'function'){
        text = hdf.formatDafYomiYerushalmi(ydaf);
      } else {
        const masechta = typeof ydaf.getMasechta === 'function' ? ydaf.getMasechta()
                       : typeof ydaf.getMasechtaTransliterated === 'function' ? ydaf.getMasechtaTransliterated()
                       : '';
        const dafNum  = typeof ydaf.getDaf === 'function' ? ydaf.getDaf() : (ydaf.daf || 0);
        if(dafNum > 0) text = masechta + ' ' + dafNum;
      }
      if(text.trim()) items.push({label:'\u05D9\u05E8\u05D5\u05E9\u05DC\u05DE\u05D9', value:text.trim()});
    }
  }catch(e){ console.log('yerushalmi:', e.message); }

  // ── Parsha ──
  try{
    if(hdf && typeof hdf.formatParsha === 'function'){
      const parsha = cleanParshaName(hdf.formatParsha(jc));
      if(parsha) items.push({label:'\u05E4\u05E8\u05E9\u05EA \u05D4\u05E9\u05D1\u05D5\u05E2', value:parsha});
    } else if(TK.parsha){
  items.push({label:'פרשת השבוע', value:cleanParshaName(TK.parsha)});
}
  }catch(e){}

  // ── Omer ──
  try{
    const omer = typeof jc.getDayOfOmer === 'function' ? jc.getDayOfOmer()
               : typeof jc.getOmerDay   === 'function' ? jc.getOmerDay() : -1;
    if(omer > 0){
      let omerText = '\u05D9\u05D5\u05DD ' + omer; // יום N
      if(hdf && typeof hdf.formatOmer === 'function'){
        const formatted = hdf.formatOmer(jc);
        if(formatted) omerText = formatted;
      }
      items.push({label:'\u05E1\u05E4\u05D9\u05E8\u05EA \u05D4\u05E2\u05D5\u05DE\u05E8', value:omerText});
    }
  }catch(e){}

  return items;
}

async function loadLimudimHebcal(){
  const lat=CFG.latitude||40.7128, lon=CFG.longitude||-74.006, tz=CFG.timezone||"America/New_York";
  const n=new Date(), y=n.getFullYear(), m=n.getMonth()+1, ts=n.toDateString();
  try{
    const url=`https://www.hebcal.com/hebcal?v=1&cfg=json&dafyomi=on&mishna=on&yerushalmi=on&omer=on&year=${y}&month=${m}&c=on&geo=pos&latitude=${lat}&longitude=${lon}&tzid=${encodeURIComponent(tz)}&b=18&M=on&s=on`;
    const cal = await fetch(url).then(r=>r.json());
    if(!cal||!cal.items) throw new Error('no items');
    const CATS = {
      "dafyomi":    "\u05D3\u05E3 \u05D9\u05D5\u05DE\u05D9",
      "mishnayomi": "\u05DE\u05E9\u05E0\u05D4 \u05D9\u05D5\u05DE\u05D9\u05EA",
      "mishna":     "\u05DE\u05E9\u05E0\u05D4 \u05D9\u05D5\u05DE\u05D9\u05EA",
      "yerushalmi": "\u05D9\u05E8\u05D5\u05E9\u05DC\u05DE\u05D9",
      "omer":       "\u05E1\u05E4\u05D9\u05E8\u05EA \u05D4\u05E2\u05D5\u05DE\u05E8",
    };
    const seen=new Set(), items=[];
    for(const item of cal.items){
      if(!item.date||new Date(item.date).toDateString()!==ts) continue;
      const lbl=CATS[item.category]; if(!lbl||seen.has(lbl)) continue;
      const val=(item.hebrew||item.title||'').trim();
      if(val){ seen.add(lbl); items.push({label:lbl,value:val}); }
    }
    if(TK.parsha) items.push({label:'\u05E4\u05E8\u05E9\u05EA \u05D4\u05E9\u05D1\u05D5\u05E2', value:cleanParshaName(TK.parsha)});
    const dailyItems = await fetch("/api/limudim/today").then(r=>r.ok?r.json():[]).catch(()=>[]);
    const adminItems=CFG.learning_json||[];
    renderLearning([...items, ...(dailyItems||[]), ...adminItems]);
    console.log('Hebcal limudim:', items.length, 'items');
  }catch(e){
    console.log('Hebcal limudim failed:', e.message);
    renderLearning(CFG.learning_json||[]);
  }
}

];
function toMin(iso,tz){
  try{const s=new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:tz});const[h,m]=s.split(":");return+h*60+ +m;}catch{return -1;}
}
async function loadZmanim(){
  const lat=CFG.latitude,lon=CFG.longitude,tz=CFG.timezone||"America/New_York";
  const el=document.getElementById("zlist");
  if(!lat||!lon){el.innerHTML='<div class="muted">נא להגדיר מיקום בAdmin</div>';return;}
  el.innerHTML='<div class="muted">טוען...</div>';
  try{
    const data=await fetch(`https://www.hebcal.com/zmanim?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${encodeURIComponent(tz)}`).then(r=>r.json());
    if(!data||!data.times)throw new Error("no times in response");
    const times=data.times;
    const nowMin=new Date().getHours()*60+new Date().getMinutes();
    let nextFound=false;const rows=[];
    for(const z of ZM){
      let iso=null;for(const k of z.k)if(times[k]){iso=times[k];break;}
      if(!iso)continue;
      const ts=fmt12(iso,tz);if(!ts||ts==="–")continue;
      const m=toMin(iso,tz);const hl=!nextFound&&m>nowMin;if(hl)nextFound=true;
      rows.push('<div class="zrow'+(hl?' hl':'')+'"><span class="z-lbl">'+z.l+'</span><span class="z-time">'+ts+'</span></div>');
    }
    el.innerHTML=rows.length?rows.join(""):'<div class="muted">אין זמנים</div>';
  }catch(e){
    console.error("loadZmanim:",e);
    el.innerHTML='<div class="muted">שגיאה — בדוק מיקום</div>';
  }
}

/* PDF */
let DOCS = [];
let DIDX = 0;
let DTMR = null;
let ACTIVE = 0;
let PDF_RENDER_TOKEN = 0;
let CURRENT_DOC_URL = "";

async function loadDocs(){

  try{

    DOCS = await fetch("/api/docs/active")
      .then(r => r.json());

    DIDX = 0;

    if(DOCS.length){
      showDoc(0);
    }else{
      showNoPdf();
    }

  }catch(e){

    console.error("loadDocs:", e);
    showNoPdf();

  }
}

function showDoc(i){

  if(!DOCS.length){
    showNoPdf();
    return;
  }

  DIDX = i % DOCS.length;

  clearTimeout(DTMR);

  const frames =
    document.querySelectorAll(".pdf-frame");

  const next =
    frames[1 - ACTIVE];

  const old =
    frames[ACTIVE];

  /* hide until loaded */
  next.style.opacity = 0;

  const fileUrl = DOCS[DIDX].file_path;
  CURRENT_DOC_URL = fileUrl;
  const token = ++PDF_RENDER_TOKEN;
  renderPdfIntoImage(fileUrl, next).then(()=>{
    if(token !== PDF_RENDER_TOKEN) return;
    next.style.opacity = 1;
    old.style.opacity = 0;
    ACTIVE = 1 - ACTIVE;
  }).catch(err=>{
    console.error("renderPdfIntoImage:", err);
    showNoPdf();
  });

  DTMR = setTimeout(()=>{

    showDoc(
      (DIDX + 1) % DOCS.length
    );

  },
  (DOCS[DIDX].duration_seconds || 20) * 1000);
}

function showNoPdf(){

  clearTimeout(DTMR);

  const frames =
    document.querySelectorAll(".pdf-frame");

  frames.forEach(f=>{

    f.style.opacity = 0;

  });
}

async function renderPdfIntoImage(url, img){
  if(!img) return;
  const wrap = img.closest(".pdf-a4") || img.parentElement || img;
  const rect = wrap.getBoundingClientRect();
  const targetW = Math.max(1, Math.floor(rect.width));
  const targetH = Math.max(1, Math.floor(rect.height));

  const cleanUrl = String(url).split("#")[0];
  const pdf = await pdfjsLib.getDocument({ url: cleanUrl, withCredentials: false }).promise;
  const page = await pdf.getPage(1);

  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const baseVp = page.getViewport({ scale: 1 });
  const scale = Math.min(targetW / baseVp.width, targetH / baseVp.height) * dpr;
  const vp = page.getViewport({ scale });

  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.floor(vp.width));
  canvas.height = Math.max(1, Math.floor(vp.height));

  const ctx = canvas.getContext("2d", { alpha: false });
  if(!ctx) return;
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  await page.render({ canvasContext: ctx, viewport: vp, background: "#ffffff" }).promise;

  // Layout is handled by `.pdf-frame` CSS (cover + full-bleed)
  img.style.position = "absolute";

  img.src = canvas.toDataURL("image/png");
}

let RESIZE_TMR = null;
window.addEventListener("resize", ()=>{
  clearTimeout(RESIZE_TMR);
  RESIZE_TMR = setTimeout(()=>{
    if(!CURRENT_DOC_URL) return;
    const frames = document.querySelectorAll(".pdf-frame");
    const activeFrame = frames[ACTIVE];
    const token = ++PDF_RENDER_TOKEN;
    renderPdfIntoImage(CURRENT_DOC_URL, activeFrame).catch(()=>{});
    // token used only to invalidate in-flight renders
    void token;
    startTickerMarquee();
  }, 150);
});
