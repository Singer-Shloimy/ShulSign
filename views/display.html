function tick(){const n=new Date(),pad=x=>String(x).padStart(2,"0");const h=n.getHours(),h12=h%12||12,ampm=h>=12?"PM":"AM";document.getElementById("clock").textContent=`${h12}:${pad(n.getMinutes())}:${pad(n.getSeconds())} ${ampm}`;}
setInterval(tick,500);tick();
let T={custom:"",hdate:"",weekday:"",parsha:"",candles:"",events:""};
function rebuild(){const sep="   ✦   ";const text=[T.custom,T.weekday+(T.hdate?"  |  "+T.hdate:""),T.parsha,T.events,T.candles].filter(Boolean).join(sep);document.getElementById("tick-seg-1").textContent=text;document.getElementById("tick-seg-2").textContent=text;}
function updateDay(){const n=new Date();T.weekday=`יום ${DAYS[n.getDay()]}  ·  ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;rebuild();}
updateDay();setInterval(updateDay,60000);
let CFG={};
async function loadSettings(){const s=await fetch("/api/settings").then(r=>r.json());CFG=s;T.custom=s.ticker||"";rebuild();renderSimchas(s.simchas_json||[]);renderList("ann-list",s.announcements_json,"אין הודעות");renderContact(s.contact_json||[]);loadZmanim(s.latitude,s.longitude,s.timezone||"America/New_York");loadHebcal(s.timezone||"America/New_York");}
let SI=[],SP=0,ST=null;
function renderSimchas(items){
  SI=items||[];SP=0;clearInterval(ST);
  if(!SI.length){document.getElementById("simchas-list").innerHTML="<div class=muted>אין שמחות</div>";return;}
  showSP(0);
  if(SI.length>1)ST=setInterval(()=>{
    const card=document.querySelector(".simcha-card");
    if(card)card.classList.add("fading");
    setTimeout(()=>showSP((SP+1)%SI.length),700);
  },4000);
}
function showSP(p){
  SP=p;const el=document.getElementById("simchas-list");
  if(!SI.length){el.innerHTML="<div class=muted>אין שמחות</div>";return;}
  const item=SI[p];
  const dots=SI.length>1?`<div class=simcha-dots>${SI.map((_,i)=>`<div class="simcha-dot${i===p?" active":""}"></div>`).join("")}</div>`:"";
  el.innerHTML=`
    <div class="simcha-card">
      <div class="simcha-mazel">✦ מזל טוב ✦</div>
      <div class="simcha-div"></div>
      <div class="simcha-name">${esc(item.label)}</div>
      ${item.value?`<div class="simcha-type">${esc(item.value)}</div>`:""}
    </div>
    ${dots}`;
}
function renderList(id,items,empty){const el=document.getElementById(id);if(!items||!items.length){el.innerHTML=`<div class=muted>${empty}</div>`;return;}el.innerHTML=items.map(i=>`<div class=rrow><span class=rlabel>${esc(i.label)}</span><span class=rvalue>${esc(i.value)}</span></div>`).join("");}
function renderContact(items){const el=document.getElementById("contact-list");if(!items||!items.length){el.innerHTML="<div class=muted>אין פרטי קשר</div>";return;}el.innerHTML=items.map(i=>`<div class=crow><span class=clabel>${esc(i.label)}</span><span class=cvalue>${esc(i.value)}</span></div>`).join("");}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function fmt12(d,tz){try{return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:tz});}catch{return "--:--";}}
async function loadHebcal(tz){try{const n=new Date(),lat=CFG.latitude||40.7128,lon=CFG.longitude||-74.006,tzE=encodeURIComponent(tz),ts=n.toDateString();const cv=await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${n.getFullYear()}&gm=${n.getMonth()+1}&gd=${n.getDate()}&g2h=1&strict=1`).then(r=>r.json());if(cv.hebrew){T.hdate=cv.hebrew;rebuild();}const sh=await fetch(`https://www.hebcal.com/shabbat?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${tzE}&gy=${n.getFullYear()}&gm=${n.getMonth()+1}&gd=${n.getDate()}&m=50`).then(r=>r.json());if(sh.items){const p=sh.items.find(x=>x.category==="parashat");if(p)T.parsha=(p.hebrew||p.title);const c=sh.items.find(x=>x.category==="candles");if(c&&new Date(c.date).toDateString()===ts)T.candles=`🕯 הדלקת נרות: ${fmt12(new Date(c.date),tz)}`;const hv=sh.items.find(x=>x.category==="havdalah");if(hv&&new Date(hv.date).toDateString()===ts)T.candles=`✨ מוצאי שבת: ${fmt12(new Date(hv.date),tz)}`;}const cal=await fetch(`https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=on&mod=on&nx=on&year=${n.getFullYear()}&month=${n.getMonth()+1}&ss=on&mf=on&c=on&geo=pos&latitude=${lat}&longitude=${lon}&tzid=${tzE}&b=18&M=on&s=on`).then(r=>r.json());if(cal.items){const skip=new Set(["parashat","candles","havdalah","hebdate"]);T.events=cal.items.filter(x=>x.date&&new Date(x.date).toDateString()===ts&&!skip.has(x.category)).map(x=>{const nm=x.hebrew||x.title||"";return x.date.includes("T")?`${nm}: ${fmt12(new Date(x.date),tz)}`:nm;}).filter(Boolean).join("   ·   ");}rebuild();}catch(e){}}
function fmtT(iso,tz){if(!iso)return null;try{return fmt12(new Date(iso),tz);}catch{return null;}}
function toMin(iso,tz){if(!iso)return -1;try{const s=new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:tz});const[h,m]=s.split(":").map(Number);return h*60+m;}catch{return -1;}}
const ZM=[{l:"",k:["alotHaShachar"]},{l:"",k:["sunrise"]},{l:"",k:["sofZmanShmaMGA"]},{l:"",k:["sofZmanShma"]},{l:"",k:["sofZmanTfillaMGA","sofZmanTfilaMGA"]},{l:"",k:["sofZmanTfilla","sofZmanTfila"]},{l:"",k:["chatzot","chatzos"]},{l:"",k:["minchaGedola"]},{l:"",k:["minchaKetanaMGA"]},{l:"",k:["plagHaMincha","plagHamincha"]},{l:"",k:["sunset"]},{l:"",k:["tzeit72min"]}];
async function loadZmanim(lat,lon,tz){const el=document.getElementById("zlist");if(!lat||!lon){el.innerHTML="<div class=muted>נא להגדיר מיקום</div>";return;}try{const n=new Date(),tzE=encodeURIComponent(tz);const times={...(await fetch(`https://www.hebcal.com/zmanim?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${tzE}`).then(r=>r.json())).times||{}};const sh=await fetch(`https://www.hebcal.com/shabbat?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${tzE}&gy=${n.getFullYear()}&gm=${n.getMonth()+1}&gd=${n.getDate()}&m=50`).then(r=>r.json());const hav=sh.items?.find(x=>x.category==="havdalah");if(hav)times.havdalah=hav.date;const now=n.getHours()*60+n.getMinutes();let nd=false;el.innerHTML=ZM.map(z=>{let iso=null;for(const k of z.k)if(times[k]){iso=times[k];break;}if(!iso)return null;const v=fmtT(iso,tz);if(!v)return null;const m=toMin(iso,tz);const hl=!nd&&m>now;if(hl)nd=true;return`<div class="zrow${hl?" hl":""}"><span class=zlabel>${z.l}</span><span class=ztime>${v}</span></div>`;}).filter(Boolean).join("");}catch(e){el.innerHTML="<div class=muted>שגיאה</div>";}}
function sizePdf(){const area=document.getElementById("pdf-area");const frame=document.getElementById("pdf-frame");if(!area||!frame||frame.style.display==="none")return;const W=area.clientWidth,H=area.clientHeight;frame.style.width=W+"px";frame.style.height=H+"px";}
window.addEventListener("resize",sizePdf);
let PD=[],PI=0,PT=null;

async function loadDocs(){try{PD=await fetch("/api/docs/active").then(r=>r.json());PI=0;PD.length?showDoc(0):showEmpty();}catch(e){}}
function showDoc(idx){if(!PD.length){showEmpty();return;}PI=idx%PD.length;clearTimeout(PT);const frame=document.getElementById("pdf-frame");document.getElementById("pdf-empty").style.display="none";frame.style.display="block";sizePdf();frame.src=PD[PI].file_path+"#toolbar=0&navpanes=0&scrollbar=0&view=Fit";PT=setTimeout(()=>showDoc((PI+1)%PD.length),(PD[PI].duration_seconds||20)*1000);}
function showEmpty(){document.getElementById("pdf-frame").style.display="none";document.getElementById("pdf-empty").style.display="flex";}
loadSettings();loadDocs();
setInterval(loadSettings,20000);
setInterval(()=>{if(CFG.latitude)loadZmanim(CFG.latitude,CFG.longitude,CFG.timezone||"America/New_York");},600000);
setInterval(loadDocs,30000);
setInterval(()=>loadHebcal(CFG.timezone||"America/New_York"),3600000);
</script>
</body>
</html>
