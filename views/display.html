<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>לוח בית הכנסת</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#f5edcf;
  --cream2:#ede0b4;
  --cream3:#e4d4a0;
  --panel:#fffdf0;
  --gold:#b8860b;
  --gold2:#d4a017;
  --gold3:#e8c040;
  --border:#c8a040;
  --brown:#4a2c0a;
  --brown2:#6b4020;
  --muted:#8b6830;
  --shadow:rgba(60,30,0,.12);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Frank Ruhl Libre','Heebo',Arial,sans-serif;
  color:var(--brown);
  background:var(--cream);
}

/* ── BACKGROUND ── */
#stage{
  position:fixed;inset:0;display:flex;flex-direction:column;
  background:linear-gradient(160deg,#f8f0d4 0%,#ece0b0 50%,#e4d49c 100%);
}

/* ── HEADER ── */
#header{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  padding:6px 24px;
  background:linear-gradient(180deg,#f0e4b8 0%,#e8d8a0 100%);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 12px var(--shadow);
  position:relative;z-index:10;
}
#header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
}
#header::after{
  content:'';position:absolute;bottom:-4px;left:5%;right:5%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold3),transparent);
}
#clock{
  font-size:clamp(32px,5vw,70px);
  font-weight:900;color:var(--brown);
  letter-spacing:.08em;
  font-variant-numeric:tabular-nums;
  text-shadow:0 1px 0 rgba(255,255,255,.6);
  direction:ltr;unicode-bidi:isolate;
}

/* ── MAIN GRID ── */
#main{
  flex:1 1 0;min-height:0;
  display:grid;
  grid-template-columns:minmax(195px,22%) 1fr minmax(185px,21%);
  gap:10px;
  padding:10px;
}

/* ── PANEL ── */
.panel{
  background:var(--panel);
  border:1.5px solid var(--border);
  border-radius:6px;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.9),
    0 2px 16px var(--shadow);
  position:relative;
}
/* top gold line */
.panel::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold3),transparent);
  z-index:1;
}
.panel-title{
  font-size:clamp(14px,1.4vw,22px);
  font-weight:900;color:var(--brown);
  text-align:center;
  padding:8px 12px 6px;
  border-bottom:1.5px solid var(--border);
  letter-spacing:.08em;
  flex:0 0 auto;
  background:linear-gradient(180deg,rgba(240,220,160,.4) 0%,transparent 100%);
}
.panel-title::after{
  content:'❧';display:block;
  font-size:11px;color:var(--gold2);
  margin-top:2px;letter-spacing:normal;
}
.panel-body{
  flex:1;min-height:0;overflow:hidden;
  padding:8px 10px;
  display:flex;flex-direction:column;
}
.muted{
  color:var(--muted);font-size:clamp(11px,.95vw,14px);
  text-align:center;margin-top:10px;font-style:italic;
}

/* ── LEFT COLUMN ── */
#left-col{display:flex;flex-direction:column;gap:10px;min-height:0;}

/* zmanim */
.zlist{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:0;}
.zrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 8px;flex:1;
  border-bottom:1px solid rgba(200,160,40,.15);
}
.zrow:last-child{border-bottom:none;}
.zrow.hl{
  background:rgba(200,160,40,.14);
  border-radius:4px;
  border-color:rgba(200,160,40,.3);
}
.zlabel{
  font-size:clamp(11px,1.05vw,16px);
  font-weight:700;color:var(--brown2);flex:1;
}
.ztime{
  font-size:clamp(11px,1.05vw,16px);
  font-weight:900;color:var(--brown);
  font-variant-numeric:tabular-nums;white-space:nowrap;
  direction:ltr;unicode-bidi:isolate;
}

/* contact */
#contact-panel{flex:0 0 auto;}
.clist{display:flex;flex-direction:column;gap:3px;}
.crow{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 8px;gap:6px;
  border-bottom:1px solid rgba(200,160,40,.15);
}
.crow:last-child{border-bottom:none;}
.clabel{font-size:clamp(10px,.9vw,14px);font-weight:700;color:var(--muted);flex:1;}
.cvalue{font-size:clamp(10px,.9vw,14px);font-weight:900;color:var(--brown);
  direction:ltr;unicode-bidi:isolate;}

/* ── CENTER: PDF fills completely ── */
#center-panel{
  grid-column:2;
  display:grid;
  grid-template-rows:auto 1fr;
  overflow:hidden;
  background:var(--panel);
  border:1.5px solid var(--border);
  border-radius:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 2px 16px var(--shadow);
}
#pdf-body{
  overflow:hidden;
  position:relative;
}
.pdf-empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(160deg,#fffdf0,#f5edcc);
  z-index:1;
}
.pe-icon{font-size:52px;color:var(--gold);}
.pe-title{font-size:clamp(16px,2vw,30px);font-weight:900;color:var(--brown2);}
.pe-sub{font-size:clamp(11px,1vw,15px);color:var(--muted);}
#pdf-frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
  display:none;
  background:#fff;
}
#pdf-canvas{display:none;}

/* ── RIGHT COLUMN ── */
#right-col{grid-column:3;display:flex;flex-direction:column;gap:10px;min-height:0;}

/* simchas */
#simchas-panel{flex:1;min-height:0;overflow:hidden;}
.simcha-list{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
.simcha-card{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px;text-align:center;gap:4px;
  border:1px solid var(--border);border-radius:4px;
  background:linear-gradient(145deg,rgba(255,253,230,.9),rgba(248,236,190,.7));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
  transition:opacity .6s ease;
}
.simcha-card.fading{opacity:0;}
.simcha-mazel{
  font-size:clamp(14px,1.4vw,21px);
  font-weight:900;color:var(--gold);letter-spacing:.1em;
}
.simcha-divider{
  width:50%;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin:3px 0;
}
.simcha-name{font-size:clamp(12px,1.1vw,17px);font-weight:700;color:var(--brown);}
.simcha-type{font-size:clamp(11px,1vw,15px);color:var(--brown2);}
.simcha-dots{display:flex;justify-content:center;gap:5px;padding:3px 0;flex:0 0 auto;}
.simcha-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s;}
.simcha-dot.active{background:var(--gold2);}

/* announcements */
#ann-panel{flex:1;min-height:0;}
.rlist{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:0;}
.rrow{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:6px 8px;gap:6px;
  border-bottom:1px solid rgba(200,160,40,.15);
}
.rrow:last-child{border-bottom:none;}
.rlabel{font-size:clamp(11px,.95vw,15px);font-weight:700;color:var(--brown2);flex:1;}
.rvalue{font-size:clamp(11px,.95vw,15px);font-weight:900;color:var(--brown);
  white-space:nowrap;direction:ltr;unicode-bidi:isolate;}

/* ── TICKER ── */
#ticker{
  flex:0 0 auto;height:clamp(34px,4.8vh,50px);
  background:linear-gradient(180deg,#e8d888,#d8c870);
  border-top:2px solid var(--border);
  overflow:hidden;display:flex;align-items:center;
  position:relative;z-index:10;
  box-shadow:0 -2px 8px var(--shadow);
}
#ticker::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold3),transparent);
}
.tick-fade-l{position:absolute;top:0;bottom:0;left:0;width:60px;z-index:2;
  background:linear-gradient(90deg,#dcc868,transparent);}
.tick-fade-r{position:absolute;top:0;bottom:0;right:0;width:60px;z-index:2;
  background:linear-gradient(-90deg,#dcc868,transparent);}
.tick-wrap{
  display:flex;white-space:nowrap;
  animation:scrollTick 45s linear infinite;
}
.tick-segment{
  display:inline-flex;align-items:center;
  font-size:clamp(13px,1.7vw,22px);font-weight:700;color:var(--brown);
  letter-spacing:.04em;padding-right:100px;
}
@keyframes scrollTick{from{transform:translateX(-50%)}to{transform:translateX(0)}}
</style>
</head>
<body>
<div id="stage">

  <div id="header">
    <div id="clock">12:00:00 PM</div>
  </div>

  <div id="main">

    <!-- LEFT: Zmanim + Contact -->
    <div id="left-col">
      <div class="panel" style="flex:1;min-height:0;">
        <div class="panel-title">זמני היום</div>
        <div class="panel-body">
          <div class="zlist" id="zlist"><div class="muted">טוען...</div></div>
        </div>
      </div>
      <div class="panel" id="contact-panel">
        <div class="panel-title">צור קשר</div>
        <div class="panel-body">
          <div class="clist" id="contact-list"><div class="muted">אין פרטי קשר</div></div>
        </div>
      </div>
    </div>

    <!-- CENTER: PDF full fill -->
    <div id="center-panel">
      <div class="panel-title">מודעות</div>
      <div id="pdf-body">
        <div class="pdf-empty" id="pdf-empty">
          <div class="pe-icon">✡</div>
          <div class="pe-title">ברוכים הבאים</div>
          <div class="pe-sub">הודעות יוצגו כאן</div>
        </div>
        <iframe id="pdf-frame" allowfullscreen></iframe>
      </div>
    </div>

    <!-- RIGHT: Simchas + Announcements -->
    <div id="right-col">
      <div class="panel" id="simchas-panel">
        <div class="panel-title">שמחות</div>
        <div class="panel-body">
          <div class="simcha-list" id="simchas-list"><div class="muted">אין שמחות</div></div>
        </div>
      </div>
      <div class="panel" id="ann-panel">
        <div class="panel-title" id="ann-title">הודעות</div>
        <div class="panel-body">
          <div class="rlist" id="ann-list"><div class="muted">אין הודעות</div></div>
        </div>
      </div>
    </div>

  </div>

  <div id="ticker">
    <div class="tick-fade-l"></div>
    <div class="tick-fade-r"></div>
    <div class="tick-wrap">
      <div class="tick-segment" id="tick-seg-1">טוען...</div>
      <div class="tick-segment" id="tick-seg-2">טוען...</div>
    </div>
  </div>

</div>
<script>
const DAYS_HE=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// clock
function tick(){
  const n=new Date(),pad=x=>String(x).padStart(2,'0');
  const h=n.getHours(),h12=h%12||12,ampm=h>=12?'PM':'AM';
  document.getElementById('clock').textContent=`${h12}:${pad(n.getMinutes())}:${pad(n.getSeconds())} ${ampm}`;
}
setInterval(tick,500);tick();

// ticker
let T={custom:'',hdate:'',weekday:'',parsha:'',candles:'',events:''};
function rebuild(){
  const sep='   ✦   ';
  const text=[T.custom,T.weekday+(T.hdate?'  |  '+T.hdate:''),T.parsha,T.events,T.candles].filter(Boolean).join(sep);
  document.getElementById('tick-seg-1').textContent=text;
  document.getElementById('tick-seg-2').textContent=text;
}
function updateDay(){
  const n=new Date();
  T.weekday=`יום ${DAYS_HE[n.getDay()]}  ·  ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  rebuild();
}
updateDay();setInterval(updateDay,60000);

// settings
let CFG={};
async function loadSettings(){
  const s=await fetch('/api/settings').then(r=>r.json());
  CFG=s;
  document.getElementById('ann-title').textContent=s.announcements_title||'הודעות';
  T.custom=s.ticker||'';rebuild();
  renderSimchas(s.simchas_json||[]);
  renderList('ann-list',s.announcements_json,'אין הודעות');
  renderContact(s.contact_json||[]);
  loadZmanim(s.latitude,s.longitude,s.timezone||'America/New_York');
  loadHebcal(s.timezone||'America/New_York');
}

// simchas rotation
let SI=[],SP=0,ST=null;
function renderSimchas(items){
  SI=items||[];SP=0;clearInterval(ST);showSP(0);
  if(SI.length>2) ST=setInterval(()=>{
    document.querySelectorAll('.simcha-card').forEach(c=>c.classList.add('fading'));
    setTimeout(()=>showSP(((SP+1)*2>=SI.length)?0:SP+1),650);
  },5000);
}
function showSP(p){
  SP=p;const el=document.getElementById('simchas-list');
  if(!SI.length){el.innerHTML='<div class="muted">אין שמחות</div>';return;}
  const sl=SI.slice(p*2,(p+1)*2);
  const tp=Math.ceil(SI.length/2);
  const dots=tp>1?`<div class="simcha-dots">${Array.from({length:tp},(_,i)=>`<div class="simcha-dot${i===p?' active':''}"></div>`).join('')}</div>`:'';
  el.innerHTML=sl.map(i=>`<div class="simcha-card"><div class="simcha-mazel">✦ מזל טוב ✦</div><div class="simcha-divider"></div><div class="simcha-name">${esc(i.label)}</div>${i.value?`<div class="simcha-type">${esc(i.value)}</div>`:''}</div>`).join('')+dots;
}

function renderList(id,items,empty){
  const el=document.getElementById(id);
  if(!items||!items.length){el.innerHTML=`<div class="muted">${empty}</div>`;return;}
  el.innerHTML=items.map(i=>`<div class="rrow"><span class="rlabel">${esc(i.label)}</span><span class="rvalue">${esc(i.value)}</span></div>`).join('');
}
function renderContact(items){
  const el=document.getElementById('contact-list');
  if(!items||!items.length){el.innerHTML='<div class="muted">אין פרטי קשר</div>';return;}
  el.innerHTML=items.map(i=>`<div class="crow"><span class="clabel">${esc(i.label)}</span><span class="cvalue">${esc(i.value)}</span></div>`).join('');
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// hebcal
function fmt12(date,tz){try{return date.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:tz});}catch{return '--:--';}}

async function loadHebcal(tz){
  try{
    const n=new Date(),lat=CFG.latitude||40.7128,lon=CFG.longitude||-74.006,tzE=encodeURIComponent(tz),ts=n.toDateString();
    const cv=await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${n.getFullYear()}&gm=${n.getMonth()+1}&gd=${n.getDate()}&g2h=1&strict=1`).then(r=>r.json());
    if(cv.hebrew){T.hdate=cv.hebrew;rebuild();}
    const sh=await fetch(`https://www.hebcal.com/shabbat?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${tzE}&gy=${n.getFullYear()}&gm=${n.getMonth()+1}&gd=${n.getDate()}&m=50`).then(r=>r.json());
    if(sh.items){
      const p=sh.items.find(x=>x.category==='parashat');if(p)T.parsha='פרשת '+(p.hebrew||p.title);
      const c=sh.items.find(x=>x.category==='candles');if(c&&new Date(c.date).toDateString()===ts)T.candles=`🕯 הדלקת נרות: ${fmt12(new Date(c.date),tz)}`;
      const h=sh.items.find(x=>x.category==='havdalah');if(h&&new Date(h.date).toDateString()===ts)T.candles=`✨ מוצאי שבת: ${fmt12(new Date(h.date),tz)}`;
    }
    const cal=await fetch(`https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=on&mod=on&nx=on&year=${n.getFullYear()}&month=${n.getMonth()+1}&ss=on&mf=on&c=on&geo=pos&latitude=${lat}&longitude=${lon}&tzid=${tzE}&b=18&M=on&s=on`).then(r=>r.json());
    if(cal.items){
      const skip=new Set(['parashat','candles','havdalah','hebdate']);
      T.events=cal.items.filter(x=>x.date&&new Date(x.date).toDateString()===ts&&!skip.has(x.category)).map(x=>{const nm=x.hebrew||x.title||'';return x.date.includes('T')?`${nm}: ${fmt12(new Date(x.date),tz)}`:nm;}).filter(Boolean).join('   ·   ');
    }
    rebuild();
  }catch(e){}
}

// zmanim
function fmtT(iso,tz){if(!iso)return null;try{return fmt12(new Date(iso),tz);}catch{return null;}}
function toMin(iso,tz){if(!iso)return -1;try{const s=new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:tz});const[h,m]=s.split(':').map(Number);return h*60+m;}catch{return -1;}}

const ZM=[
  {l:'עלות השחר',k:['alotHaShachar']},{l:'הנץ החמה',k:['sunrise']},
  {l:'סוף ק״ש מג״א',k:['sofZmanShmaMGA']},{l:'סוף ק״ש גר״א',k:['sofZmanShma']},
  {l:'סוף תפילה מג״א',k:['sofZmanTfillaMGA','sofZmanTfilaMGA']},
  {l:'סוף תפילה גר״א',k:['sofZmanTfilla','sofZmanTfila']},
  {l:'חצות',k:['chatzot','chatzos']},{l:'מנחה גדולה',k:['minchaGedola']},
  {l:'מנחה קטנה',k:['minchaKetana']},{l:'פלג המנחה',k:['plagHaMincha','plagHamincha']},
  {l:'שקיעה',k:['sunset']},{l:'צאת הכוכבים',k:['tzeit']},{l:'צאת ר״ת',k:['tzeit72min']},
];

async function loadZmanim(lat,lon,tz){
  const el=document.getElementById('zlist');
  if(!lat||!lon){el.innerHTML='<div class="muted">נא להגדיר מיקום</div>';return;}
  try{
    const n=new Date(),tzE=encodeURIComponent(tz);
    const zd=await fetch(`https://www.hebcal.com/zmanim?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${tzE}`).then(r=>r.json());
    const times={...zd.times||{}};
    const sh=await fetch(`https://www.hebcal.com/shabbat?cfg=json&latitude=${lat}&longitude=${lon}&tzid=${tzE}&gy=${n.getFullYear()}&gm=${n.getMonth()+1}&gd=${n.getDate()}&m=50`).then(r=>r.json());
    const hav=sh.items?.find(x=>x.category==='havdalah');if(hav)times.havdalah=hav.date;
    const now=n.getHours()*60+n.getMinutes();let nd=false;
    el.innerHTML=ZM.map(z=>{
      let iso=null;for(const k of z.k)if(times[k]){iso=times[k];break;}
      if(!iso)return null;const v=fmtT(iso,tz);if(!v)return null;
      const m=toMin(iso,tz);const hl=!nd&&m>now;if(hl)nd=true;
      return`<div class="zrow${hl?' hl':''}"><span class="zlabel">${z.l}</span><span class="ztime">${v}</span></div>`;
    }).filter(Boolean).join('');
  }catch(e){el.innerHTML='<div class="muted">שגיאה</div>';}
}

// PDF rotation — single iframe
let PD=[],PI=0,PT=null;

async function loadDocs(){
  try{
    PD=await fetch('/api/docs/active').then(r=>r.json());
    PI=0;
    PD.length ? showDoc(0) : showEmpty();
  }catch(e){}
}

function showDoc(idx){
  if(!PD.length){showEmpty();return;}
  PI=idx%PD.length;
  clearTimeout(PT);

  const frame=document.getElementById('pdf-frame');
  const empty=document.getElementById('pdf-empty');

  empty.style.display='none';
  frame.style.display='block';
  frame.src=PD[PI].file_path+'#toolbar=0&navpanes=0&scrollbar=0&view=Fit';

  const dur=(PD[PI].duration_seconds||20)*1000;
  PT=setTimeout(()=>showDoc((PI+1)%PD.length), dur);
}

function showEmpty(){
  document.getElementById('pdf-frame').style.display='none';
  document.getElementById('pdf-empty').style.display='flex';
}

// init
loadSettings();loadDocs();
setInterval(loadSettings,20000);
setInterval(()=>{if(CFG.latitude)loadZmanim(CFG.latitude,CFG.longitude,CFG.timezone||'America/New_York');},600000);
setInterval(loadDocs,30000);
setInterval(()=>loadHebcal(CFG.timezone||'America/New_York'),3600000);
</script>
</body>
</html>
